name: Daily Sales Pipeline

on:
  workflow_dispatch:
    inputs:
      file_name:
        description: "CSV file to process"
        required: true
        default: "sales_2026_06_10.csv"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: US
      RAW_DATASET: sales_raw
      ANALYTICS_DATASET: sales_analytics
      BUCKET_NAME: ${{ secrets.GCP_BUCKET_NAME }}
      FILE_NAME: ${{ github.event.inputs.file_name }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Upload selected CSV to GCS
        run: |
          gcloud storage cp \
            daily_sales_pipeline_demo/incoming/$FILE_NAME \
            gs://$BUCKET_NAME/incoming/$FILE_NAME

      - name: Load GCS file to BigQuery
        run: uv run python scripts/load_gcs_to_bigquery.py

      - name: Run dbt build
        run: uv run dbt build --project-dir dbt_sales_pipeline
