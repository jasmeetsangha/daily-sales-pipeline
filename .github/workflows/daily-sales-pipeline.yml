name: Daily Sales Pipeline

on:
  workflow_dispatch:
    inputs:
      file_name:
        description: "CSV file to process. Leave default for good test file."
        required: false
        default: "sales_2026_06_10.csv"

  schedule:
    - cron: "15 13 * * *"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: US
      RAW_DATASET: sales_raw
      ANALYTICS_DATASET: sales_analytics
      BUCKET_NAME: ${{ secrets.GCP_BUCKET_NAME }}
      FILE_NAME: ${{ github.event.inputs.file_name || '' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Resolve source file name
        id: resolve_file
        run: |
          echo "Initial FILE_NAME=$FILE_NAME"

          if [ -z "$FILE_NAME" ]; then
            echo "No manual file_name input was provided."
            echo "Looking for the first CSV file in gs://$BUCKET_NAME/incoming/"

            FILE_URI=$(gcloud storage ls "gs://$BUCKET_NAME/incoming/*.csv" 2>/dev/null | sort | head -n 1 || true)

            if [ -z "$FILE_URI" ]; then
              echo "No CSV files found in gs://$BUCKET_NAME/incoming/"
              echo "This is a no-op scheduled run."

              echo "no_file_found=true" >> "$GITHUB_OUTPUT"
              echo "FILE_NAME=" >> "$GITHUB_ENV"
              exit 0
            fi

            FILE_NAME=$(basename "$FILE_URI")
          fi

          echo "Resolved FILE_NAME=$FILE_NAME"

          echo "no_file_found=false" >> "$GITHUB_OUTPUT"
          echo "file_name=$FILE_NAME" >> "$GITHUB_OUTPUT"
          echo "FILE_NAME=$FILE_NAME" >> "$GITHUB_ENV"

      - name: Record pipeline started event
        if: ${{ steps.resolve_file.outputs.no_file_found != 'true' }}
        run: |
          EVENT_ID="github_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}_started"

          bq query --use_legacy_sql=false "
          INSERT INTO \`${PROJECT_ID}.${RAW_DATASET}.pipeline_run_events\`
            (
              event_id,
              github_run_id,
              github_run_attempt,
              file_name,
              event_type,
              event_time,
              source_uri,
              destination_uri,
              message
            )
          VALUES
            (
              '${EVENT_ID}',
              '${GITHUB_RUN_ID}',
              '${GITHUB_RUN_ATTEMPT}',
              '${FILE_NAME}',
              'PIPELINE_STARTED',
              CURRENT_TIMESTAMP(),
              'gs://${BUCKET_NAME}/incoming/${FILE_NAME}',
              NULL,
              'Pipeline started for file'
            )
          "
      - name: Record no file found event
        if: ${{ steps.resolve_file.outputs.no_file_found == 'true' }}
        run: |
          EVENT_ID="github_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}_no_file"

          bq query --use_legacy_sql=false "
          INSERT INTO \`${PROJECT_ID}.${RAW_DATASET}.pipeline_run_events\`
            (
              event_id,
              github_run_id,
              github_run_attempt,
              file_name,
              event_type,
              event_time,
              source_uri,
              destination_uri,
              message
            )
          VALUES
            (
              '${EVENT_ID}',
              '${GITHUB_RUN_ID}',
              '${GITHUB_RUN_ATTEMPT}',
              'NO_FILE_FOUND',
              'NO_FILE_FOUND',
              CURRENT_TIMESTAMP(),
              'gs://${BUCKET_NAME}/incoming/',
              NULL,
              'No CSV files found in incoming folder'
            )
          "

      - name: Record no file found audit row
        if: ${{ steps.resolve_file.outputs.no_file_found == 'true' }}
        run: |
          RUN_ID="github_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}"

          bq query --use_legacy_sql=false "
          INSERT INTO \`${PROJECT_ID}.${RAW_DATASET}.pipeline_run_audit\`
            (run_id, file_name, started_at, completed_at, row_count, status, error_message)
          VALUES
            (
              '${RUN_ID}',
              'NO_FILE_FOUND',
              CURRENT_TIMESTAMP(),
              CURRENT_TIMESTAMP(),
              0,
              'NO_FILE_FOUND',
              'No CSV files found in incoming folder'
            )
          "

      - name: Check source file exists in GCS
        if: ${{ steps.resolve_file.outputs.no_file_found != 'true' }}
        run: |
          echo "Checking file: gs://$BUCKET_NAME/incoming/$FILE_NAME"

          if ! gcloud storage ls "gs://$BUCKET_NAME/incoming/$FILE_NAME"; then
            echo "Source file not found."
            echo "Expected: gs://$BUCKET_NAME/incoming/$FILE_NAME"
            exit 1
          fi

      - name: Load GCS file to BigQuery
        if: ${{ steps.resolve_file.outputs.no_file_found != 'true' }}
        run: uv run python scripts/load_gcs_to_bigquery.py

      - name: Create dbt profile
        if: ${{ steps.resolve_file.outputs.no_file_found != 'true' }}
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          dbt_sales_pipeline:
            target: dev
            outputs:
              dev:
                type: bigquery
                method: oauth
                project: $PROJECT_ID
                dataset: $ANALYTICS_DATASET
                location: $REGION
                threads: 4
          EOF

      - name: Check dbt connection
        if: ${{ steps.resolve_file.outputs.no_file_found != 'true' }}
        run: uv run dbt debug --project-dir dbt_sales_pipeline

      - name: Run dbt build
        if: ${{ steps.resolve_file.outputs.no_file_found != 'true' }}
        run: uv run dbt build --project-dir dbt_sales_pipeline

      - name: Move file to processed
        if: ${{ success() && steps.resolve_file.outputs.no_file_found != 'true' }}
        run: |
          echo "Moving file to processed folder."

          gcloud storage mv \
            "gs://$BUCKET_NAME/incoming/$FILE_NAME" \
            "gs://$BUCKET_NAME/processed/$FILE_NAME"

      - name: Record pipeline success event
        if: ${{ success() && steps.resolve_file.outputs.no_file_found != 'true' }}
        run: |
          EVENT_ID="github_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}_success"

          bq query --use_legacy_sql=false "
          INSERT INTO \`${PROJECT_ID}.${RAW_DATASET}.pipeline_run_events\`
            (
              event_id,
              github_run_id,
              github_run_attempt,
              file_name,
              event_type,
              event_time,
              source_uri,
              destination_uri,
              message
            )
          VALUES
            (
              '${EVENT_ID}',
              '${GITHUB_RUN_ID}',
              '${GITHUB_RUN_ATTEMPT}',
              '${FILE_NAME}',
              'PIPELINE_SUCCESS',
              CURRENT_TIMESTAMP(),
              'gs://${BUCKET_NAME}/incoming/${FILE_NAME}',
              'gs://${BUCKET_NAME}/processed/${FILE_NAME}',
              'Pipeline completed successfully and file moved to processed'
            )
          "

      - name: Move file to rejected
        if: ${{ failure() && steps.resolve_file.outputs.no_file_found != 'true' }}
        run: |
          echo "Pipeline failed. Attempting to move file to rejected folder."

          if [ -z "$FILE_NAME" ]; then
            echo "FILE_NAME is empty. Nothing to move."
            exit 0
          fi

          if gcloud storage ls "gs://$BUCKET_NAME/incoming/$FILE_NAME"; then
            gcloud storage mv \
              "gs://$BUCKET_NAME/incoming/$FILE_NAME" \
              "gs://$BUCKET_NAME/rejected/$FILE_NAME"
          else
            echo "File is not in incoming folder. Nothing to move."
          fi

      - name: Record pipeline failed event
        if: ${{ failure() && steps.resolve_file.outputs.no_file_found != 'true' }}
        run: |
          EVENT_ID="github_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}_failed"

          bq query --use_legacy_sql=false "
          INSERT INTO \`${PROJECT_ID}.${RAW_DATASET}.pipeline_run_events\`
            (
              event_id,
              github_run_id,
              github_run_attempt,
              file_name,
              event_type,
              event_time,
              source_uri,
              destination_uri,
              message
            )
          VALUES
            (
              '${EVENT_ID}',
              '${GITHUB_RUN_ID}',
              '${GITHUB_RUN_ATTEMPT}',
              '${FILE_NAME}',
              'PIPELINE_FAILED',
              CURRENT_TIMESTAMP(),
              'gs://${BUCKET_NAME}/incoming/${FILE_NAME}',
              'gs://${BUCKET_NAME}/rejected/${FILE_NAME}',
              'Pipeline failed and file was moved to rejected if it still existed in incoming'
            )
          "

      - name: No-op summary
        if: ${{ steps.resolve_file.outputs.no_file_found == 'true' }}
        run: |
          echo "Pipeline completed with no-op status."
          echo "No CSV files were available in incoming folder."