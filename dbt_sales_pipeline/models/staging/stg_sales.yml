version: 2

models:
  - name: stg_sales
    description: Cleaned daily sales data from the raw GCS sales file.

    columns:
      - name: order_id
        description: Unique order identifier.
        tests:
          - not_null
          - unique

      - name: order_date
        description: Date when the order happened.
        tests:
          - not_null

      - name: store_id
        description: Store where the order happened.
        tests:
          - not_null

      - name: customer_id
        description: Customer identifier.
        tests:
          - not_null

      - name: product_id
        description: Product identifier.
        tests:
          - not_null

      - name: quantity
        description: Quantity sold.
        tests:
          - not_null

      - name: unit_price
        description: Price per unit.
        tests:
          - not_null

      - name: discount_amount
        description: Discount amount for the order.
        tests:
          - not_null

      - name: net_amount
        description: Gross amount minus discount.
        tests:
          - not_null
